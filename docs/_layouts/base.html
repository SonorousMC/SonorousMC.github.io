<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

  {%- include head.html -%}

  <body style="margin: 0; display: flex; flex-direction: column; height: 100vh;">

    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
        <div style="position: relative; width: 100%; height: 100%;">
            <iframe
                style="width: auto; height: 100%; pointer-events: none; z-index: 1; position: fixed;"
                frameborder="0"
                src="https://www.youtube.com/embed/MmB9b5njVbA?autoplay=1&mute=1&controls=0&showinfo=0&playlist=MmB9b5njVbA&loop=1&playsinline=1&disablekb=1&fs=0"
                allow="accelerometer; autoplay; encrypted-media; gyroscope; presentation"
                allowfullscreen="true">
            </iframe>

            <div class="wrapper" style="position: absolute; z-index: 2; top: 0; left: 0; right: 0; bottom: 0;">
                {{ content }} <!-- This div will cover the iframe -->
            </div>
        </div>
    </main>

    {%- include footer.html -%}

    {%- include sub-footer.html -%}

  </body>

</html>
