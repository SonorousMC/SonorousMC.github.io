<!DOCTYPE html>
<style>

  .overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white; /* Change to the desired text color */
        text-align: center; /* Center the text */
        z-index: 1; /* Ensure overlay is above the iframe */
        pointer-events: auto; /* Allow events on the overlay */
    }
</style>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

  {%- include head.html -%}

  <body>


    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
    <iframe
        style="width: 100%; height: 100%; pointer-events: none;"
        frameborder="0"
        src="#https://www.youtube.com/embed/MmB9b5njVbA?autoplay=1&mute=1&controls=0&showinfo=0&playlist=MmB9b5njVbA&loop=1&playsinline=1&disablekb=1&fs=0"
        allow="accelerometer; autoplay; encrypted-media; gyroscope; presentation"
        allowfullscreen="true">
    </iframe>

    <div class="overlay">
        <div class="wrapper">
            {{ content }}
        </div>
    </div>

    </main>

    {%- include footer.html -%}

    {%- include sub-footer.html -%}

  </body>

</html>
